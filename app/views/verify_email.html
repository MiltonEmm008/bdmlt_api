<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Verificar cuenta - Banco BDMLT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #020617;
      border-radius: 18px;
      padding: 30px;
      max-width: 420px;
      width: 100%;
      border: 1px solid #1f2937;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-left: -18px;
    }

    .circle:first-child {
      margin-left: 0;
    }

    .green {
      background: #3bff4a;
    }

    .red {
      background: #ff4444;
    }

    .white {
      background: #f4f4f4;
    }

    .brand {
      margin-top: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #f9fafb;
    }

    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    p {
      font-size: 0.9rem;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .message {
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .message.error {
      color: #ff9b9b;
    }

    .message.success {
      color: #7dff8c;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo-container">

      <div class="logo">
        <div class="circle green"></div>
        <div class="circle red"></div>
        <div class="circle white"></div>
      </div>

      <div class="brand">BDMLT</div>

    </div>

    <h1>Verificación de cuenta</h1>
    <p>Estamos verificando tu correo electrónico. Esto puede tardar unos segundos.</p>

    <div id="message" class="message" style="display:none"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const messageEl = document.getElementById("message");

    async function verificar() {
      if (!token) {
        messageEl.textContent = "Enlace de verificación inválido.";
        messageEl.classList.add("error");
        messageEl.style.display = "block";
        return;
      }

      try {
        const resp = await fetch("/auth/verificar-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await resp.json();

        if (!resp.ok) {
          const errorMessage =
            (data && (data.detail || data.mensaje)) ||
            "No se pudo verificar la cuenta.";
          throw new Error(errorMessage);
        }

        messageEl.textContent =
          (data && (data.mensaje || data.detail)) ||
          "Cuenta verificada correctamente. Ya puedes iniciar sesión.";

        messageEl.classList.add("success");
      } catch (err) {
        messageEl.textContent = err.message || "No se pudo verificar la cuenta.";
        messageEl.classList.add("error");
      }

      messageEl.style.display = "block";
    }

    verificar();
  </script>

</body>

</html>

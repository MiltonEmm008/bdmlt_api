<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Restablecer contraseña - Banco BDMLT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    /* tarjeta */

    .card {
      background: #020617;
      border-radius: 18px;
      padding: 30px;
      max-width: 420px;
      width: 100%;
      border: 1px solid #1f2937;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    /* logo */

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-left: -18px;
    }

    .circle:first-child {
      margin-left: 0;
    }

    .green {
      background: #3bff4a;
    }

    .red {
      background: #ff4444;
    }

    .white {
      background: #f4f4f4;
    }

    .brand {
      margin-top: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #f9fafb;
    }

    /* textos */

    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    p {
      font-size: 0.9rem;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* formulario */

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #3bff4a;
      box-shadow: 0 0 0 1px #3bff4a;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 11px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #3bff4a, #ff4444);
      color: #020617;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .field {
      margin-bottom: 1rem;
    }

    .message {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .message.error {
      color: #ff9b9b;
    }

    .message.success {
      color: #7dff8c;
    }
  </style>
</head>

</body>

<body>

  <div class="card">

    <!-- LOGO -->
    <div class="logo-container">

      <div class="logo">
        <div class="circle green"></div>
        <div class="circle red"></div>
        <div class="circle white"></div>
      </div>

      <div class="brand">BDMLT</div>

    </div>

    <h1>Restablecer contraseña</h1>
    <p>Ingresa tu nueva contraseña para tu cuenta.</p>

    <form id="reset-form">

      <input type="hidden" id="token" name="token" />

      <div class="field">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" required minlength="6" />
      </div>

      <div class="field">
        <label for="confirmar_password">Confirmar contraseña</label>
        <input type="password" id="confirmar_password" required minlength="6" />
      </div>

      <button type="submit">Guardar contraseña</button>

      <div id="message" class="message" style="display:none"></div>

    </form>
  </div>

  <script>

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    document.getElementById("token").value = token;

    const form = document.getElementById("reset-form");
    const messageEl = document.getElementById("message");

    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      messageEl.style.display = "none";
      messageEl.textContent = "";
      messageEl.className = "message";

      const payload = {
        token: document.getElementById("token").value,
        password: document.getElementById("password").value,
        confirmar_password: document.getElementById("confirmar_password").value
      };

      try {

        const resp = await fetch("/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await resp.json();

        if (!resp.ok) {
          const errorMessage =
            (data && (data.detail || data.mensaje)) ||
            "No se pudo procesar la solicitud.";
          throw new Error(errorMessage);
        }

        messageEl.textContent =
          (data && (data.mensaje || data.detail)) ||
          "Contraseña actualizada correctamente.";

        messageEl.classList.add("success");
        form.reset();

      } catch (err) {

        messageEl.textContent = err.message || "No se pudo procesar la solicitud.";
        messageEl.classList.add("error");

      }

      messageEl.style.display = "block";

    });

  </script>

</body>

</html>
